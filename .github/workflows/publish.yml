name: Publish MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish from package.json
        required: false
        type: string
      dry_run:
        description: Run npm publish in dry-run mode
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify requested version
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ github.event.inputs.version }}" ]; then
            echo "Expected version ${{ github.event.inputs.version }} but found $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Pack package
        run: npm pack --dry-run

      - name: Publish package (manual dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package (tag)
        if: github.event_name == 'push'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

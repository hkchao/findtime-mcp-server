name: Publish to MCP Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify server.json version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          SERVER_VERSION=$(node -p "require('./server.json').version")
          if [ "$PACKAGE_VERSION" != "$SERVER_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match server.json version ($SERVER_VERSION)"
            exit 1
          fi

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
